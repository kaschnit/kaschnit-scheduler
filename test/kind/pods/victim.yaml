---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-victim
  labels:
    quota.scheduling.kaschnit.github.io/queue: "tenant-a"
    quota.scheduling.kaschnit.github.io/victim: "true"
spec:
  schedulerName: kaschnit-scheduler
  priorityClassName: "medium"
  containers:
  - name: nginx
    image: nginx:1.14.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 3
        memory: 1Gi
      limits:
        cpu: 5
        memory: 1Gi
