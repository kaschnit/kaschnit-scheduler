---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-preemptor
  labels:
    quota.scheduling.kaschnit.github.io/queue: "tenant-a"
    quota.scheduling.kaschnit.github.io/preemptor: "true"
spec:
  schedulerName: custom-scheduler
  priorityClassName: "high"
  containers:
  - name: nginx
    image: nginx:1.14.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 2
        memory: 1Gi
      limits:
        cpu: 5
        memory: 1Gi
