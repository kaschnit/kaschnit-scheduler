---
apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
leaderElection:
  leaderElect: false
profiles:
- schedulerName: custom-scheduler
  plugins:
    multiPoint:
      enabled:
      - name: QuotaAwarePreemption
    postFilter:
      enabled:
      - name: QuotaAwarePreemption
      disabled:
      - name: "*"
  pluginConfig:
  - name: QuotaAwarePreemption
    args:
      apiVersion: scheduling.kaschnit.github.io/v1
      kind: QuotaAwarePreemptionArgs
      preemption:
        enableAsyncPreemption: true
      queues:
        tenant-a:
          quota:
            max:
              cpu: 3
              memory: 3Gi
              pods: 2
        tenant-b:
          quota:
            max:
              cpu: 3
              memory: 3Gi
              pods: 2
