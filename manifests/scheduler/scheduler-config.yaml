---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduler-config
  namespace: custom-scheduler
data:
  scheduler-config.yaml: |
    ---
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
    profiles:
    - schedulerName: custom-scheduler
      plugins:
        multiPoint:
          enabled:
          - name: QuotaAwarePreemption
        postFilter:
          enabled:
          - name: QuotaAwarePreemption
          disabled:
          - name: "*"
