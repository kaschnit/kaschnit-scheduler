---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kaschnit-scheduler.fullname" . }}-scheduler
rules:
  # Pod Binding & Lifecycle
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "update", "delete"]
  - apiGroups: [""]
    resources: ["bindings", "pods/binding"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["patch", "update"]

  # Cluster Topology & Node State 
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["topology.node.k8s.io"]
    resources: ["noderesourcetopologies"]
    verbs: ["get", "list", "watch"]

  # Storage & Volume Topology
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csidrivers", "csinodes", "csistoragecapacities", "storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]

  # Read-Only Infrastructure Discovery
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "replicationcontrollers", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps", "extensions"]
    resources: ["statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["deviceclasses", "resourceclaims", "resourceslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]

  # Events
  - apiGroups: ["", "events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

  # Webhook / Auth Extensions
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]

  # Queue custom resources
  - apiGroups: ["scheduling.kaschnit.github.io"]
    resources: ["queues", "queues/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["scheduling.x-k8s.io"]
    resources: ["elasticquotas", "elasticquotas/status", "podgroups", "podgroups/status"]
    verbs: ["create", "delete", "get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kaschnit-scheduler.fullname" . }}-scheduler
  labels:
    {{- include "kaschnit-scheduler.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "kaschnit-scheduler.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kaschnit-scheduler.fullname" . }}-scheduler
  apiGroup: rbac.authorization.k8s.io
