---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kaschnit-scheduler.fullname" . }}-scheduler-leader-election
rules:
  - apiGroups: ["coordination.k8s.io", ""]
    resources: ["leases", "endpoints"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io", ""]
    resources: ["leases", "endpoints"]
    resourceNames:
    - {{ include "kaschnit-scheduler.fullname" . }}-scheduler
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kaschnit-scheduler.fullname" . }}-scheduler-leader-election
  labels:
    {{- include "kaschnit-scheduler.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "kaschnit-scheduler.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "kaschnit-scheduler.fullname" . }}-scheduler-leader-election
  apiGroup: rbac.authorization.k8s.io
