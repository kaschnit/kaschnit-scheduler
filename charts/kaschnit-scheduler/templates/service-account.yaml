---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kaschnit-scheduler.serviceAccountName" . }}
  labels:
    {{- include "kaschnit-scheduler.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
imagePullSecrets: {{ .Values.serviceAccount.imagePullSecrets | default list | toJson }}