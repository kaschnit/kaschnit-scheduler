---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kaschnit-scheduler.fullname" . }}-config
data:
  scheduler-config.yaml: |
    ---
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
      resourceName: kaschnit-scheduler-scheduler
      resourceNamespace: {{ .Release.Namespace }}
      resourceLock: leases
    profiles:
    {{- range $profileName, $profile := .Values.scheduler.profiles }}
    - schedulerName: {{ $profileName | quote }}
      plugins: {{- toYaml $profile.plugins | nindent 8 }}
      {{- if $pluginConfigs := $profile.pluginConfig }}
      pluginConfig:
      {{- range $pluginName, $pluginConfig := $pluginConfigs }}
      - name: {{ title $pluginName }}
        {{- toYaml $pluginConfig | nindent 8 }}
      {{- end }}
      {{- end }}
    {{- end }}
